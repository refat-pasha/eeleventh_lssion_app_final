# pubspec.yaml

name: eleventh_lesson
description: LMS platform for fast learning and collaboration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.1

  # Local Storage
  get_storage: ^2.1.1

  # HTTP Client
  http: ^1.2.2

  # Date Formatting
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # File Picker (for uploads)
  file_picker: ^8.1.2
  url_launcher: ^6.2.5
  googleapis: ^13.1.0
  google_sign_in: ^6.2.1
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/